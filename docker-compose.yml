services:
  feed-notifier:
    image: ghcr.io/anakingig/feed-notifier:latest
    container_name: feed-notifier
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data

    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s